# Sector ETF map (per spec §4 — sector/theme ranking). Each sector ETF is the
# proxy used to score that theme.
sector_etfs:
  tech_broad: XLK
  semis: SMH
  energy: XLE
  financials: XLF
  healthcare: XLV
  industrials: XLI
  defense: ITA
  retail: XRT
  discretionary: XLY
  staples: XLP
  utilities: XLU
  real_estate: XLRE
  materials: XLB
  communication: XLC
  china: FXI
  bitcoin: IBIT

# Symbol → sector classification. Keys must match a key in sector_etfs above.
# Symbols absent here contribute 0.0 sector strength to the composite.
